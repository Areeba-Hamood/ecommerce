{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Crystal Elegance</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{% static 'store/css/auth.css' %}">
</head>
<body>
    <div class="auth-card">
        <div class="card-top">
            <span class="logo">💎</span>
            <h3>Reset Password</h3>
            <p>Create your new password</p>
        </div>
        <div class="card-body">
            <div class="msg-box" id="msg"></div>
            <form id="form">
                {% csrf_token %}
                <div class="form-group">
                    <label>New Password</label>
                    <i class="fas fa-lock"></i>
                    <input type="password" id="pass1" placeholder="Enter new password" required>
                </div>
                <div class="form-group">
                    <label>Confirm Password</label>
                    <i class="fas fa-lock"></i>
                    <input type="password" id="pass2" placeholder="Confirm new password" required>
                </div>
                <button type="submit" class="btn">Reset Password</button>
            </form>
            <p class="bottom-link"><a href="{% url 'login' %}">← Back to Login</a></p>
        </div>
    </div>

    <script>
        document.getElementById('form').addEventListener('submit', function(e) {
            e.preventDefault();
            const p1 = document.getElementById('pass1').value;
            const p2 = document.getElementById('pass2').value;
            const msg = document.getElementById('msg');
            if (!p1 || !p2) { msg.className = 'msg-box error show'; msg.textContent = 'Please fill all fields'; return; }
            if (p1.length < 8) { msg.className = 'msg-box error show'; msg.textContent = 'Password must be 8+ characters'; return; }
            if (p1 !== p2) { msg.className = 'msg-box error show'; msg.textContent = 'Passwords do not match'; return; }
            msg.className = 'msg-box success show';
            msg.textContent = 'Password reset successful!';
            this.reset();
        });
    </script>
</body>
</html>
