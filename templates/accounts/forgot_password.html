{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Crystal Elegance</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{% static 'css/auth.css' %}">
</head>
<body>
    <div class="auth-card">
        <div class="card-top">
            <span class="logo">💎</span>
            <h3>Forgot Password</h3>
            <p>Enter email to reset password</p>
        </div>

        <div class="card-body">
            <div class="msg-box error" id="msgBox"></div>

            <form id="forgotForm">
                {% csrf_token %}
                <div class="form-group">
                    <label>Email Address</label>
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="email" placeholder="Enter your email" required>
                </div>

                <button type="submit" class="btn">Send Reset Link</button>
            </form>

            <p class="bottom-link">
                <a href="{% url 'login' %}">← Back to Login</a>
            </p>
        </div>
    </div>

    <script>
        document.getElementById('forgotForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const box = document.getElementById('msgBox');
            
            if (!email) {
                box.className = 'msg-box error show';
                box.textContent = 'Enter your email';
                return;
            }
            if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                box.className = 'msg-box error show';
                box.textContent = 'Enter a valid email';
                return;
            }
            
            box.className = 'msg-box success show';
            box.textContent = 'Reset link sent! Check email.';
            this.reset();
        });
    </script>
</body>
</html>
